<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSP men's collection</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
    background:linear-gradient(135deg,#3b0000,#7a0000,#b30000);
    color:white;
    overflow-x:hidden;
}

/* NAVBAR */
.navbar{
    position:absolute;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:15px 20px;
    z-index:1000;
}
.logo img{width:110px;}

.nav-links{display:flex;gap:25px;}
.nav-links a{
    color:white;
    text-decoration:none;
    transition:0.3s;
}
.nav-links a:hover{color:#ffb3b3;}

.menu-toggle{display:none;color:white;font-size:22px;}

/* MOBILE MENU */
.mobile-menu{
    position:fixed;
    right:-100%;
    top:0;
    width:70%;
    height:100%;
    background:#1a0000;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:30px;
    transition:0.3s;
    z-index:9999;
}
.mobile-menu.active{right:0;}

.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    z-index:9998;
}
.overlay.active{display:block;}

/* CAROUSEL */
.carousel{
    width:100%;
    height:70vh;
    overflow:hidden;
    position:relative;
}
.slides{
    display:flex;
    width:100%;
    height:100%;
    transition:transform 0.8s ease-in-out;
}
.slides img{
    width:100%;
    height:100%;
    object-fit:cover;
    flex-shrink:0;
}

/* CENTERED NAV DOTS */
.carousel-dots{
    position:absolute;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
    z-index:10;
}
.carousel-dots span{
    width:10px;
    height:10px;
    background:white;
    border-radius:50%;
    opacity:0.6;
    cursor:pointer;
}
.carousel-dots span.active{
    opacity:1;
    background:#ff4d4d;
}

/* TITLE */
.section-title{
    text-align:center;
    margin:40px 0;
    font-size:36px;
    font-family:'Playfair Display',serif;
}

/* PRODUCTS */
.products{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:20px;
    padding:20px;
}

/* 🔥 UPDATED CARD DESIGN */
.product{
    background:linear-gradient(145deg,#1a0000,#330000);
    color:white;
    border-radius:12px;
    overflow:hidden;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.5);
    cursor:pointer;
    transition:0.3s;
    border:1px solid rgba(255,255,255,0.1);
}

.product:hover{
    transform:translateY(-8px) scale(1.02);
}

.product img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.product h4{
    font-size:15px;
    margin:10px 0;
    color:#fff;
}

.product p{
    color:#ff4d4d;
    font-weight:bold;
    margin-bottom:10px;
}

/* FOOTER */
.footer{
    background:#1a0000;
    padding:40px 20px;
    text-align:center;
}

/* MOBILE */
@media(max-width:768px){

    .nav-links{display:none;}
    .menu-toggle{display:block;}

    .carousel{ height:40vh; }
    .products{
        grid-template-columns:repeat(2,1fr);
    }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo"><img src="logo.png"></div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="home.html">Men</a>
        <a href="contact.html">Contact</a>
    </div>

    <div>
        <i class="fas fa-bars menu-toggle" onclick="toggleMenu()"></i>
    </div>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="mobile-menu" id="menu">
    <a href="index.html">Home</a>
    <a href="home.html">Men</a>
    <a href="contact.html">Contact</a>
</div>

<!-- CAROUSEL -->
<div class="carousel">
    <div class="slides" id="slides">
        <img src="poster1.png" alt="">
        <img src="poster2.png" alt="">
        <img src="poster3.png" alt="">
    </div>
</div>

<h2 class="section-title">Men's Collection</h2>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<script>

/* MOBILE MENU */
function toggleMenu(){
    document.getElementById("menu").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
}

/* PRODUCTS */
const products = [
{img:"black.png", name:"Black Classic Suit", price:2499},
{img:"white.png", name:"Pure White Kurta", price:2499},
{img:"sky_blue.png", name:"Sky Blue Elegance", price:2499},
{img:"purple.png", name:"Royal Purple Style", price:2499},
{img:"cream.png", name:"Cream Soft Wear", price:2499},
{img:"dark_green.png", name:"Dark Green Premium", price:2499},
{img:"chocklate.png", name:"Chocolate Brown Look", price:2499},
{img:"camel.png", name:"Camel Desert Style", price:2499},
{img:"grey.png", name:"Modern Grey Fit", price:2499},
{img:"brown.png", name:"Classic Brown Wear", price:2499}
];

let html = "";
for(let i=0;i<products.length;i++){
    html += `
    <div class="product" onclick="openProduct(${i+1})">
        <img src="${products[i].img}">
        <h4>${products[i].name}</h4>
        <p>Rs ${products[i].price}</p>
    </div>`;
}
document.getElementById("products").innerHTML = html;

function openProduct(id){
    window.location.href = "product" + id + ".html";
}

/* CAROUSEL LOGIC */
let slideIndex = 0;
const slides = document.getElementById('slides');
const totalSlides = slides.children.length;

function showSlide(){
    slideIndex++;
    if(slideIndex >= totalSlides) slideIndex = 0;
    slides.style.transform = `translateX(-${slideIndex * 100}%)`;
}

setInterval(showSlide, 4000); // slide every 4s

</script>

</body>
</html>
